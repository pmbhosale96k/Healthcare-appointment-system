# ================================
# APPLICATION CONFIGURATION
# ================================
spring.application.name=Healthcare-System
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ================================
# SERVER CONFIGURATION (Render requires dynamic port)
# ================================
server.port=${PORT:8080}

# ================================
# DATABASE CONFIGURATION (TiDB Cloud)
# ================================
# We use VERIFY_CA to ensure a secure connection to TiDB
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test?sslMode=VERIFY_CA&enabledTLSProtocols=TLSv1.2
spring.datasource.username=4De9nTDyXb6T4P4.root
spring.datasource.password=sfwd3sJO0whp5XSQ
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# TLS CERTIFICATE (TiDB Cloud)
# ================================
# IMPORTANT: Ensure this path is correct on the machine running the code
spring.datasource.hikari.data-source-properties.sslMode=VERIFY_CA
spring.datasource.hikari.data-source-properties.tlsVersions=TLSv1.2
spring.datasource.hikari.data-source-properties.sslCa=D:/hackthonPract/Hospital Management/backend/healthcare-app/certs/certificate-tidb.pem

# ================================
# CONNECTION POOL (HikariCP)
# ================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ================================
# JPA / HIBERNATE CONFIGURATION
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# GMAIL SMTP CONFIGURATION
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=srujandeshmukh9@gmail.com
spring.mail.password=rjozgzeetcklusny

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ================================
# ACTUATOR (Health Check for Docker / Render)
# ================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ================================
# LOGGING CONFIGURATION
# ================================
logging.level.root=INFO
logging.level.org.springframework.mail=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n